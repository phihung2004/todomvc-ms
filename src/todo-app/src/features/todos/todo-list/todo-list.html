<section class="main">

    @if(store.hasTodo$|async){
       <input type="checkbox" 
    id="toggle-all"
    class="toggle-all"
    (change)="toggleAll($event)"
    [checked]="store.isAllCompleted$ | async"
    />
    <label for="toggle-all">Mark all as complete</label> 
    }
    

<ul class="todo-list">
    @for (item of store.filteredTodos$ | async ; track item.id ){
        <app-todo-item
        [todo]="item"
        (itemToDelete)="deleteTodo($event)"
        (itemToToggle)="toggleItem($event)"
        (itemToEdit)="editTodo($event)"
         ></app-todo-item>
    } 
</ul>
</section>
