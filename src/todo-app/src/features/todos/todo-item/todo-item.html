<!-- Bọc vào để nó lấy CSS của TodoMVC. -->
 <!-- thêm hover hiện xóa 
 Check box tròn 
 edit inline thì chiếm dòng đos thay vì them 1 dòng bên dưới, là nó có CSS behavior của nó rồi -->
<!-- Tự mò là hơi lâu á , responsive mệt điên-->
<li [class.completed]="todo().isCompleted" [class.editing]="isEditing">

<div class="view">
      <input 
      type="checkbox" 
      class="toggle"
      [checked]="todo().isCompleted" 
      (change)="toggleItem()" />

      <label (dblclick)="startEdit()">{{todo().title}}</label>

      <button 
      class="destroy"
      (click)="deleteItem()"></button>

</div>
@if (isEditing){
      <input type="text" 
      class="edit"
      [value]="todo().title" 
      (blur)="submitEdit($event.target.value)"
      (keyup.enter)="submitEdit($event.target.value)"
      (keyup.escape)="cancelEdit()"
      autofocus
      />
}
</li>
